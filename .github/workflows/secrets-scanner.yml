name: Secrets Scanner

on:
  push:

  pull_request:

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  secrets-scanner:
    name: Secrets Scanner
    uses: the-lupaxa-project/workflows/.github/workflows/reusable-secrets-scanner.yml@master
    secrets: inherit

  generate-workflow-summary:
    name: Generate Workflow Summary
    needs:
      - secrets-scanner
    if: always()
    uses: the-lupaxa-project/workflows/.github/workflows/reusable-workflow-summary.yml@master

  generate-workflow-notifications:
    name: Generate Workflow Notifications
    needs:
      - generate-workflow-summary
    if: always()
    uses: the-lupaxa-project/workflows/.github/workflows/reusable-workflow-notifier.yml@master
    with:
      notify_on_results: "failure,timed_out"
    secrets:
      slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
